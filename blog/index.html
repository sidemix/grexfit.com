<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Blog — GREX | Workouts, Tips & AI Training</title>
<meta name="description" content="Expert fitness articles, workout routines, nutrition tips, and AI training insights from Alex, your AI personal trainer.">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --lime: #CCFF00; --navy: #0A0E1A; --surface: #111827; --text: #f0f4ff; --muted: #8b9dc3; }
  html { scroll-behavior: smooth; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; background: var(--navy); color: var(--text); }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; background: rgba(10,14,26,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(204,255,0,0.08); }
  .nav-logo { font-size: 24px; font-weight: 900; color: var(--lime); letter-spacing: -1px; text-decoration: none; }
  .nav-cta { background: var(--lime); color: var(--navy); font-weight: 800; font-size: 14px; padding: 10px 22px; border-radius: 10px; text-decoration: none; }

  .blog-header { padding: 140px 40px 60px; text-align: center; max-width: 800px; margin: 0 auto; }
  .blog-header h1 { font-size: 48px; font-weight: 900; margin-bottom: 16px; }
  .blog-header h1 span { color: var(--lime); }
  .blog-header p { color: var(--muted); font-size: 18px; line-height: 1.6; }

  .posts-grid { max-width: 900px; margin: 0 auto; padding: 0 40px 80px; display: flex; flex-direction: column; gap: 24px; }

  .post-card { background: var(--surface); border-radius: 16px; padding: 32px; border: 1px solid rgba(204,255,0,0.06); transition: border-color 0.2s, transform 0.2s; text-decoration: none; color: var(--text); display: block; }
  .post-card:hover { border-color: rgba(204,255,0,0.3); transform: translateY(-2px); }
  .post-meta { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
  .post-category { background: rgba(204,255,0,0.1); color: var(--lime); padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 12px; }
  .post-card h2 { font-size: 24px; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
  .post-card p { color: var(--muted); font-size: 16px; line-height: 1.6; }
  .read-more { color: var(--lime); font-weight: 700; font-size: 14px; margin-top: 12px; display: inline-block; }

  footer { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; border-top: 1px solid rgba(204,255,0,0.06); }
  footer a { color: var(--lime); text-decoration: none; }

  @media (max-width: 600px) {
    nav { padding: 12px 20px; }
    .blog-header { padding: 120px 20px 40px; }
    .blog-header h1 { font-size: 32px; }
    .posts-grid { padding: 0 20px 60px; }
    .post-card { padding: 24px; }
    .post-card h2 { font-size: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">GREX</a>
  <a href="https://apps.apple.com/us/app/grex/id6760127402" class="nav-cta">Download Free</a>
</nav>

<div class="blog-header">
  <h1>The <span>GREX</span> Blog</h1>
  <p>Workout routines, fitness tips, and training insights from Alex — your AI personal trainer.</p>
</div>

<div class="posts-grid" id="posts"></div>

<footer>
  <p>© 2026 GREX — <a href="/">Home</a> · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p>
</footer>

<script>
fetch('/blog/posts.json')
  .then(r => r.json())
  .then(posts => {
    const grid = document.getElementById('posts');
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    posts.forEach(p => {
      const card = document.createElement('a');
      card.className = 'post-card';
      card.href = `/blog/posts/${p.slug}.html`;
      card.innerHTML = `
        <div class="post-meta">
          <span class="post-category">${p.category}</span>
          <span>${new Date(p.date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}</span>
          <span>By ${p.author}</span>
        </div>
        <h2>${p.title}</h2>
        <p>${p.excerpt}</p>
        <span class="read-more">Read more →</span>
      `;
      grid.appendChild(card);
    });
  });
</script>
</body>
</html>
